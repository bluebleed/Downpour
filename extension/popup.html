<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        font-family: system-ui, sans-serif;
        padding: 12px;
        margin: 0;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #555;
        margin: 14px 0 6px;
      }
      label.toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }
      .field {
        margin: 8px 0;
        font-size: 12px;
      }
      .field label {
        display: block;
        margin-bottom: 3px;
        color: #444;
      }
      input[type="number"],
      textarea {
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 12px;
        padding: 5px 6px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      textarea {
        resize: vertical;
        min-height: 42px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .row input[type="number"] {
        width: 90px;
      }
      .count {
        font-size: 10px;
        color: #888;
      }
      .count.over {
        color: #c0392b;
      }
      button {
        font-family: inherit;
        font-size: 12px;
        padding: 6px 12px;
        border: none;
        border-radius: 5px;
        background: #2d6cdf;
        color: #fff;
        cursor: pointer;
      }
      button.secondary {
        background: #e6e6e6;
        color: #333;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .hint {
        margin-top: 10px;
        font-size: 11px;
        color: #777;
      }
      .saved {
        font-size: 11px;
        color: #27ae60;
        margin-left: 6px;
      }
      #mediaLinks {
        list-style: none;
        margin: 6px 0 0;
        padding: 0;
        max-height: 110px;
        overflow-y: auto;
        font-size: 11px;
      }
      #mediaLinks li {
        padding: 3px 0;
        border-bottom: 1px solid #eee;
        word-break: break-all;
      }
      #mediaLinks .kind {
        display: inline-block;
        min-width: 38px;
        color: #2d6cdf;
        font-weight: 600;
      }
      .empty {
        color: #999;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>🌧️ Downpour Capture</h1>
    <label class="toggle">
      <input type="checkbox" id="enabled" />
      Capture downloads
    </label>
    <p class="hint" id="status">Checking connection…</p>

    <h2>Filter</h2>
    <div class="field">
      <label for="minSize">Minimum file size to capture (MB)</label>
      <div class="row">
        <input type="number" id="minSize" min="0" max="100" step="0.1" />
        <span class="hint" style="margin:0">0–100 MB</span>
      </div>
    </div>

    <div class="field">
      <label for="whitelist">Whitelist — capture only these extensions</label>
      <textarea id="whitelist" placeholder="mp4, zip, pdf (comma or space separated)"></textarea>
      <span class="count" id="whitelistCount"></span>
    </div>

    <div class="field">
      <label for="blacklist">Blacklist — skip these extensions</label>
      <textarea id="blacklist" placeholder="ico, css, js"></textarea>
      <span class="count" id="blacklistCount"></span>
    </div>
    <p class="hint">Whitelist takes precedence. Up to 200 entries per list.</p>

    <div class="actions">
      <button id="save">Save filter</button>
      <button id="reset" class="secondary">Reset</button>
      <span class="saved" id="savedMsg" hidden>Saved ✓</span>
    </div>

    <h2>Media on this page</h2>
    <ul id="mediaLinks">
      <li class="empty">Scanning…</li>
    </ul>

    <script src="filter.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
